<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1F3864">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AvariApp">
<link rel="manifest" href="/avariapp/manifest.json?v=111">
<link rel="apple-touch-icon" href="/avariapp/icon.png">
<title>AvariApp</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg-page: #0D1117; --bg-card: #161B22; --bg-input: #0D1117;
    --border: #30363D; --text: #E6EDF3; --accent: #2563EB; --radius-lg: 16px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg-page); color: var(--text); padding: 16px; margin: 0; }
  .app { max-width: 560px; margin: 0 auto; }

  /* Banner de Instalação Estilizado */
  #install-card {
    display: none; align-items: center; gap: 14px; background: #1B2A4A;
    border: 1px solid #1E3A6E; border-radius: var(--radius-lg); padding: 13px 16px; margin-bottom: 20px;
  }
  .install-card-icon { width: 44px; height: 44px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .install-card-icon img { width: 100%; height: 100%; object-fit: cover; }
  .install-card-body { flex: 1; }
  .install-card-body strong { display: block; font-size: 14px; color: #fff; }
  .install-card-body span { font-size: 11px; color: #7D8590; }
  .install-card-btn { padding: 8px 12px; background: #E36B1A; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

  /* Estilos do seu Formulário */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
  h1 { font-size: 24px; margin-bottom: 4px; color: #fff; }
  p.subtitle { color: #7D8590; font-size: 14px; margin-bottom: 24px; }
  label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
  input, select, textarea { 
    width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); 
    border-radius: 8px; color: #fff; margin-bottom: 16px; box-sizing: border-box;
  }
  .btn-primary { 
    width: 100%; padding: 14px; background: var(--accent); color: #fff; 
    border: none; border-radius: 8px; font-weight: 600; cursor: pointer; 
  }
  footer { text-align: center; padding: 20px; font-size: 12px; color: #7EE787; opacity: 0.8; }
</style>
</head>
<body>

<div class="app">
  <div id="install-card">
    <div class="install-card-icon"><img src="/avariapp/icon.png" alt="AvariApp"></div>
    <div class="install-card-body">
      <strong>Instalar AvariApp</strong>
      <span>Clique para usar como App</span>
    </div>
    <button class="install-card-btn" onclick="executarInstalacao()">INSTALAR</button>
  </div>

  <h1>AvariApp</h1>
  <p class="subtitle">Registro de Avarias - Lactalis Brasil</p>

  <div class="card">
    <label>Câmara</label>
    <select id="camara">
      <option value="Batavo">Batavo</option>
      <option value="Itambé">Itambé</option>
      <option value="DPA">DPA</option>
    </select>

    <label>Operador</label>
    <input type="text" id="operador" placeholder="Seu nome">

    <label>Matrícula</label>
    <input type="number" id="matricula" placeholder="000000">

    <label>Supervisor</label>
    <input type="text" id="supervisor" placeholder="Nome do supervisor">

    <label>Observações da Avaria</label>
    <textarea id="obs" rows="3" placeholder="Descreva o ocorrido..."></textarea>

    <button class="btn-primary" onclick="gerarProtocolo()">GERAR REGISTRO / PDF</button>
  </div>
</div>

<footer>
  <strong>VERSÃO FINAL: v1.1.1</strong><br>
  Lactalis do Brasil - Logística
</footer>

<script>
  // --- LÓGICA DE INSTALAÇÃO PWA ---
  let promptInstalacao;
  const banner = document.getElementById('install-card');

  // Verifica se já está aberto como App
  const isApp = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

  if (!isApp) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      promptInstalacao = e;
      banner.style.display = 'flex';
    });
  }

  async function executarInstalacao() {
    if (promptInstalacao) {
      promptInstalacao.prompt();
      const { outcome } = await promptInstalacao.userChoice;
      if (outcome === 'accepted') banner.style.display = 'none';
      promptInstalacao = null;
    }
  }

  // --- LÓGICA DO SEU APP (EXEMPLO DE FUNÇÃO) ---
  function gerarProtocolo() {
    const op = document.getElementById('operador').value;
    if(!op) { alert('Por favor, preencha o nome do operador.'); return; }
    alert('Registro de ' + op + ' gerado com sucesso! (Aqui dispara sua lógica de PDF/Excel)');
  }

  // --- REGISTRO DO SERVICE WORKER ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/avariapp/sw.js?v=111');
  }
</script>

</body>
</html>
