<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1F3864">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AvariApp">
<link rel="manifest" href="/avariapp/manifest.json">
<link rel="apple-touch-icon" href="/avariapp/icon.png">
<title>AvariApp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg-page: #0D1117; --bg-card: #161B22; --bg-item: #1C2330; --bg-input: #0D1117;
    --border: #30363D; --text: #E6EDF3; --text-muted: #7D8590; --accent: #2563EB;
    --radius-md: 12px; --radius-lg: 16px; --green-bg: #0D2818; --green-text: #7EE787;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg-page); color: var(--text); padding: 16px; margin: 0; }
  .app { max-width: 560px; margin: 0 auto; }
  
  /* Banner de Instalação */
  .install-card {
    display: flex; align-items: center; gap: 14px; background: #1B2A4A;
    border: 1px solid #1E3A6E; border-radius: var(--radius-lg); padding: 13px 16px; margin-bottom: 14px;
  }
  .install-card-icon { width: 44px; height: 44px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .install-card-icon img { width: 40px; height: 40px; }
  .install-card-body { flex: 1; }
  .install-card-body strong { display: block; font-size: 14px; }
  .install-card-body span { font-size: 12px; color: var(--text-muted); }
  .install-card-btn { padding: 8px 16px; background: #E36B1A; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

  /* Modal iOS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: flex-end; }
  .modal-sheet { background: var(--bg-card); width: 100%; padding: 20px; border-radius: 20px 20px 0 0; }
</style>
</head>
<body>
<div class="app">
  <div id="install-card" class="install-card" style="display:none">
    <div class="install-card-icon"><img src="/avariapp/icon.png" alt="App"></div>
    <div class="install-card-body">
      <strong>Instalar AvariApp</strong>
      <span>Acesso rápido e offline</span>
    </div>
    <button class="install-card-btn" onclick="onInstallClick()">Instalar</button>
  </div>

  <h1>AvariApp</h1>
  <p>Registre suas avarias aqui.</p>
</div>

<script>
  // Lógica de Instalação PWA
  let deferredPrompt;
  const installCard = document.getElementById('install-card');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installCard.style.display = 'flex';
  });

  async function onInstallClick() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installCard.style.display = 'none';
      }
      deferredPrompt = null;
    }
  }

  // Registrar Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/avariapp/sw.js')
      .then(() => console.log("Service Worker Ativo"))
      .catch(err => console.error("Erro SW:", err));
  }
</script>
</body>
</html>
