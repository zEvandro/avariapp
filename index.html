<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1F3864">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AvariApp">
<link rel="manifest" href="/avariapp/manifest.json?v=112">
<link rel="apple-touch-icon" href="/avariapp/icon.png">
<title>AvariApp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg-page: #0D1117; --bg-card: #161B22; --bg-item: #1C2330; --bg-input: #0D1117;
    --border: #30363D; --text: #E6EDF3; --text-muted: #7D8590; --accent: #2563EB;
    --accent-hover: #3b82f6; --success: #238636; --danger: #da3633;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
    --green-bg: #0D2818; --green-text: #7EE787;
  }
  /* O restante do seu CSS continua exatamente igual aqui... */
  body { font-family: 'Inter', sans-serif; background: var(--bg-page); color: var(--text); padding: 16px; margin: 0; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
  .app { max-width: 560px; margin: 0 auto; }
  
  /* ADICIONEI APENAS ESTE ESTILO PARA O BOTÃO DE INSTALAÇÃO */
  #btn-instalar-pwa {
    display: none; width: 100%; background: #E36B1A; color: white; border: none; 
    padding: 15px; border-radius: var(--radius-md); font-weight: bold; margin-bottom: 20px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="app">
  <button id="btn-instalar-pwa" onclick="btInstalar()">📲 INSTALAR AVARIAPP NO APARELHO</button>

  <header style="margin-bottom: 24px;">
    <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px;">AvariApp</h1>
    <p style="color: var(--text-muted); font-size: 14px;">Registro de Avarias &middot; v1.1.2</p>
  </header>

  <div class="card" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px;">
     </div>
</div>

<script>
  // --- PARTE NOVA: LÓGICA DE INSTALAÇÃO (SEM MEXER NO RESTO) ---
  let servicoInstalacao;
  const btnPWA = document.getElementById('btn-instalar-pwa');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    servicoInstalacao = e;
    // Só mostra o botão se NÃO estiver rodando como app
    if (!window.matchMedia('(display-mode: standalone)').matches) {
      btnPWA.style.display = 'block';
    }
  });

  async function btInstalar() {
    if (servicoInstalacao) {
      servicoInstalacao.prompt();
      const { outcome } = await servicoInstalacao.userChoice;
      if (outcome === 'accepted') btnPWA.style.display = 'none';
      servicoInstalacao = null;
    }
  }

  // Se o app já estiver aberto (instalado), esconde o botão
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    btnPWA.style.display = 'none';
  }

  // --- O SEU JAVASCRIPT ORIGINAL COMEÇA AQUI ---
  // MANTENHA TODAS AS SUAS FUNÇÕES: gerarPDF(), addLinha(), etc.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/avariapp/sw.js?v=112');
  }
</script>
</body>
</html>
