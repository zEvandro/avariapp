<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1F3864">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AvariApp">
<link rel="manifest" href="/avariapp/manifest.json">
<link rel="apple-touch-icon" href="/avariapp/icon.png">
<title>AvariApp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg-page: #0D1117; --bg-card: #161B22; --text: #E6EDF3; --text-muted: #7D8590;
    --radius-lg: 16px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg-page); color: var(--text); padding: 16px; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
  .app { max-width: 560px; margin: 0 auto; flex: 1; width: 100%; }
  
  /* Banner de Instalação */
  #install-card {
    display: none; align-items: center; gap: 14px; background: #1B2A4A;
    border: 1px solid #1E3A6E; border-radius: var(--radius-lg); padding: 13px 16px; margin-bottom: 20px;
  }
  .install-card-icon { width: 44px; height: 44px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .install-card-icon img { width: 100%; height: 100%; object-fit: cover; }
  .install-card-body { flex: 1; }
  .install-card-body strong { display: block; font-size: 14px; }
  .install-card-body span { font-size: 11px; color: var(--text-muted); }
  .install-card-btn { padding: 8px 16px; background: #E36B1A; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

  footer { text-align: center; padding: 20px; font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <div id="install-card">
    <div class="install-card-icon"><img src="/avariapp/icon.png" alt="AvariApp"></div>
    <div class="install-card-body">
      <strong>Instalar AvariApp</strong>
      <span>Toque para usar como aplicativo</span>
    </div>
    <button class="install-card-btn" onclick="executarInstalacao()">Instalar</button>
  </div>

  <h1>AvariApp</h1>
  <p>Registro de Avarias - Lactalis Brasil</p>
  </div>

<footer>
  AvariApp v1.0.6 | Lactalis do Brasil
</footer>

<script>
  let promptInstalacao;
  const banner = document.getElementById('install-card');

  // Verifica se está no modo standalone (instalado)
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

  if (!isStandalone) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      promptInstalacao = e;
      banner.style.display = 'flex';
    });
  }

  async function executarInstalacao() {
    if (promptInstalacao) {
      promptInstalacao.prompt();
      const { outcome } = await promptInstalacao.userChoice;
      if (outcome === 'accepted') banner.style.display = 'none';
      promptInstalacao = null;
    }
  }

  window.addEventListener('appinstalled', () => {
    banner.style.display = 'none';
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/avariapp/sw.js?v=6')
      .then(reg => {
        reg.onupdatefound = () => {
          const installingWorker = reg.installing;
          installingWorker.onstatechange = () => {
            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload(); // Recarrega se houver versão nova
            }
          };
        };
      });
  }
</script>
</body>
</html>
